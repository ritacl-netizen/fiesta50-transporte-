<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fotografias — MYN50</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      min-height: 100dvh;
      color: #fff;
      -webkit-tap-highlight-color: transparent;
    }

    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: -1;
    }

    /* --- LOGIN --- */
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      padding: 20px;
    }

    .card {
      text-align: center;
      max-width: 420px;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 40px 32px;
      backdrop-filter: blur(12px);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 300;
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 6px;
      opacity: 0.9;
    }

    .subtitle {
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 16px; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 8px;
      text-align: left;
    }

    label .hint { text-transform: none; letter-spacing: 0.5px; opacity: 0.7; }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      background: rgba(0, 0, 0, 0.3);
      color: #fff;
      outline: none;
      transition: border-color 0.3s;
      text-align: center;
      letter-spacing: 3px;
    }

    input[type="text"]:focus { border-color: rgba(255, 255, 255, 0.4); }

    button.btn {
      width: 100%;
      margin-top: 24px;
      padding: 14px 24px;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
    }

    button.btn:hover { background: rgba(255, 255, 255, 0.18); border-color: rgba(255, 255, 255, 0.4); }
    button.btn:active { transform: scale(0.98); }
    button.btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .message {
      margin-top: 20px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.9rem;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .message.error { background: rgba(220, 38, 38, 0.25); border: 1px solid rgba(255, 100, 100, 0.2); display: block; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.4);
      text-decoration: none;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: opacity 0.3s;
    }

    .back-link:hover { opacity: 1; color: #fff; }

    /* --- GALLERY --- */
    #gallery-view {
      display: none;
      min-height: 100vh;
      min-height: 100dvh;
    }

    .gallery-header {
      text-align: center;
      padding: 2.5rem 1.5rem 1rem;
    }

    .gallery-header h1 {
      font-size: 1.6rem;
      margin-bottom: 4px;
    }

    .gallery-greeting {
      font-size: 0.9rem;
      font-weight: 400;
      opacity: 0.5;
      margin-bottom: 1.5rem;
    }

    /* Filters */
    .filters {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      padding: 0 1rem;
    }

    .filter-btn {
      padding: 8px 20px;
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.06);
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      transition: all 0.25s;
      backdrop-filter: blur(8px);
    }

    .filter-btn:hover {
      border-color: rgba(255, 255, 255, 0.35);
      color: #fff;
    }

    .filter-btn.active {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255, 255, 255, 0.5);
      color: #fff;
    }

    .filter-count {
      font-weight: 300;
      opacity: 0.6;
      margin-left: 4px;
    }

    /* Photo grid */
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 4px;
      padding: 0 4px 4rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .photo-item {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    .photo-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }

    .photo-item img.loaded { opacity: 1; }
    .photo-item:hover img { transform: scale(1.05); }

    .photo-item .dl-btn {
      position: absolute;
      bottom: 8px; right: 8px;
      width: 36px; height: 36px;
      background: rgba(0, 0, 0, 0.45);
      border: none; border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.25s;
      backdrop-filter: blur(6px);
      z-index: 2;
    }

    .photo-item:hover .dl-btn { opacity: 1; }

    /* Always visible on touch devices */
    @media (hover: none) {
      .photo-item .dl-btn { opacity: 0.7; }
    }

    .dl-btn svg { width: 18px; height: 18px; }

    .no-photos {
      text-align: center;
      padding: 4rem 2rem;
      opacity: 0.5;
      font-size: 0.95rem;
    }

    .loading-gallery {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      font-size: 0.9rem;
      opacity: 0.5;
    }

    .loading-gallery .spinner { margin-right: 12px; }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .lightbox.active { display: flex; }

    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
    }

    .lightbox .close-btn {
      position: absolute;
      top: 1.5rem; right: 1.5rem;
      width: 44px; height: 44px;
      background: rgba(255, 255, 255, 0.1);
      border: none; border-radius: 50%;
      color: #fff; font-size: 1.5rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
    }

    .lightbox .nav-btn {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      width: 50px; height: 50px;
      background: rgba(255, 255, 255, 0.1);
      border: none; border-radius: 50%;
      color: #fff; font-size: 1.5rem;
      cursor: pointer;
      backdrop-filter: blur(10px);
    }

    .lightbox .nav-btn.prev { left: 1.5rem; }
    .lightbox .nav-btn.next { right: 1.5rem; }

    .lightbox .counter {
      position: absolute;
      bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-size: 0.85rem; opacity: 0.5;
    }

    .lightbox .lb-dl-btn {
      position: absolute;
      top: 1.5rem; right: 5rem;
      width: 44px; height: 44px;
      background: rgba(255, 255, 255, 0.1);
      border: none; border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(10px);
    }

    .lightbox .lb-dl-btn:hover { background: rgba(255, 255, 255, 0.25); }
    .lightbox .lb-dl-btn svg { width: 20px; height: 20px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .card { padding: 28px 20px; }
      h1 { font-size: 1.2rem; letter-spacing: 4px; }
      input[type="text"] { font-size: 1.1rem; padding: 16px; }
      button.btn { padding: 16px 24px; font-size: 0.9rem; min-height: 50px; }
      .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 2px; padding: 0 2px 4rem; }
      .filter-btn { padding: 7px 14px; font-size: 0.7rem; letter-spacing: 1.5px; }
      .lightbox .nav-btn { width: 40px; height: 40px; font-size: 1.2rem; }
      .lightbox .nav-btn.prev { left: 0.5rem; }
      .lightbox .nav-btn.next { right: 0.5rem; }
    }
  </style>
</head>
<body>

  <video id="bg-video" autoplay muted loop playsinline>
    <source src="../fire.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <!-- LOGIN -->
  <div class="login-container" id="login-view">
    <div class="card">
      <h1>Fotografias</h1>
      <p class="subtitle">Ingresa tus datos</p>

      <div class="form-group">
        <label>CI <span class="hint">(solo numeros)</span></label>
        <input type="text" id="ciInput" autocomplete="off" inputmode="numeric">
      </div>

      <div class="form-group">
        <label>Ultimos 4 digitos del celular</label>
        <input type="text" id="phoneInput" maxlength="4" autocomplete="off" inputmode="numeric">
      </div>

      <button class="btn" id="loginBtn" onclick="login()">Ingresar</button>
      <div id="message" class="message"></div>
      <a href="/" class="back-link">Volver</a>
    </div>
  </div>

  <!-- GALLERY -->
  <div id="gallery-view">
    <div class="gallery-header">
      <h1>MYN50</h1>
      <p class="gallery-greeting" id="greeting"></p>

      <div class="filters">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">
          Todas <span class="filter-count" id="count-all"></span>
        </button>
        <button class="filter-btn" data-filter="whatsapp" onclick="setFilter('whatsapp')">
          WhatsApp <span class="filter-count" id="count-whatsapp"></span>
        </button>
        <button class="filter-btn" data-filter="pro" onclick="setFilter('pro')">
          Pro <span class="filter-count" id="count-pro"></span>
        </button>
      </div>
    </div>

    <div class="loading-gallery" id="loading">
      <span class="spinner"></span> Cargando fotos...
    </div>

    <div class="no-photos" id="no-photos" style="display:none"></div>

    <div class="photo-grid" id="photo-grid"></div>

    <div style="text-align:center; padding: 1rem 0 3rem;">
      <a href="/" class="back-link">Volver</a>
    </div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightbox" id="lightbox">
    <button class="lb-dl-btn" id="lb-dl-btn" title="Descargar"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
    <button class="close-btn" onclick="closeLightbox()">&times;</button>
    <button class="nav-btn prev" onclick="navigateLightbox(-1)">&#8249;</button>
    <img id="lightbox-img" src="" alt="">
    <button class="nav-btn next" onclick="navigateLightbox(1)">&#8250;</button>
    <span class="counter" id="lightbox-counter"></span>
  </div>

  <script>
    const FOTOS_AUTH_URL = 'https://script.google.com/macros/s/AKfycbwbHYukvEmqoRgrlc2tFPVuPhGx59mcGLFnKL6KzIJ8A60fJFMq7jY2g9OK-2AKhuUhlA/exec';
    const R2_URL = 'https://pub-b1b3bdad9e3742a7a323d65bf8f0436a.r2.dev';
    const BACKEND_URL = 'https://fiesta50-backend-723746235838.us-east1.run.app';
    const MAPPINGS_STATIC = '../data/mappings.json';

    let allPhotos = { whatsapp: [], pro: [] };
    let currentFilter = 'all';
    let currentPhotos = [];
    let currentIndex = 0;

    // Check session
    const saved = sessionStorage.getItem('myn50_guest');
    if (saved) {
      showGallery(JSON.parse(saved));
    }

    // Login
    document.getElementById('ciInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('phoneInput').focus();
    });
    document.getElementById('phoneInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') login();
    });

    async function login() {
      const ci = document.getElementById('ciInput').value.trim();
      const phone4 = document.getElementById('phoneInput').value.trim();
      const msg = document.getElementById('message');
      msg.className = 'message'; msg.style.display = 'none';

      if (!ci || !/^\d+$/.test(ci)) { showMsg('CI: solo numeros.', 'error'); return; }
      if (!/^\d{4}$/.test(phone4)) { showMsg('Ingresa 4 digitos.', 'error'); return; }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Verificando...';

      try {
        const res = await fetch(`${FOTOS_AUTH_URL}?ci=${ci}&phone4=${phone4}`);
        const result = await res.json();
        if (result.success) {
          const guest = { name: result.name, guestId: result.guestId };
          sessionStorage.setItem('myn50_guest', JSON.stringify(guest));
          showGallery(guest);
        } else {
          showMsg(result.message, 'error');
        }
      } catch (e) {
        showMsg('Error de conexion.', 'error');
      }

      btn.disabled = false;
      btn.innerHTML = 'Ingresar';
    }

    function showMsg(text, type) {
      const el = document.getElementById('message');
      el.textContent = text;
      el.className = 'message ' + type;
      el.style.display = 'block';
    }

    // Gallery
    async function showGallery(guest) {
      document.getElementById('login-view').style.display = 'none';
      document.getElementById('gallery-view').style.display = 'block';
      document.getElementById('greeting').textContent = `Hola, ${guest.name}`;
      document.body.style.overflow = 'auto';

      try {
        let data;
        try {
          const res = await fetch(`${BACKEND_URL}/api/mappings`);
          data = await res.json();
        } catch (e) {
          const res = await fetch(MAPPINGS_STATIC);
          data = await res.json();
        }
        const guestData = data.guest_to_photos[guest.guestId];

        if (!guestData) {
          allPhotos = { whatsapp: [], pro: [] };
        } else if (Array.isArray(guestData)) {
          allPhotos = { whatsapp: guestData, pro: [] };
        } else {
          allPhotos = {
            whatsapp: guestData.whatsapp || [],
            pro: guestData.pro || [],
          };
        }

        // Update counts
        const totalWa = allPhotos.whatsapp.length;
        const totalPro = allPhotos.pro.length;
        document.getElementById('count-all').textContent = totalWa + totalPro;
        document.getElementById('count-whatsapp').textContent = totalWa || '(proximamente)';
        document.getElementById('count-pro').textContent = totalPro || '(proximamente)';

        document.getElementById('loading').style.display = 'none';
        setFilter('all');
      } catch (e) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('no-photos').style.display = 'block';
        document.getElementById('no-photos').textContent = 'Error al cargar las fotos.';
      }
    }

    function setFilter(filter) {
      currentFilter = filter;

      // Update active button
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      document.querySelector(`.filter-btn[data-filter="${filter}"]`).classList.add('active');

      // Build photo list with source info
      let photos = [];
      if (filter === 'all' || filter === 'whatsapp') {
        photos = photos.concat(allPhotos.whatsapp.map(id => ({ id, source: 'whatsapp', prefix: 'party-whatsapp' })));
      }
      if (filter === 'all' || filter === 'pro') {
        photos = photos.concat(allPhotos.pro.map(id => ({ id, source: 'pro', prefix: 'party-pro' })));
      }

      currentPhotos = photos;

      if (photos.length === 0) {
        document.getElementById('photo-grid').innerHTML = '';
        document.getElementById('no-photos').style.display = 'block';
        document.getElementById('no-photos').textContent = 'No hay fotos en esta categoria todavia.';
      } else {
        document.getElementById('no-photos').style.display = 'none';
        renderGrid(photos);
      }
    }

    function renderGrid(photos) {
      const grid = document.getElementById('photo-grid');
      grid.innerHTML = '';

      photos.forEach((photo, index) => {
        const item = document.createElement('div');
        item.className = 'photo-item';

        const img = document.createElement('img');
        img.dataset.src = `${R2_URL}/${photo.prefix}/${photo.id}.jpg`;
        img.alt = `Foto ${index + 1}`;
        img.loading = 'lazy';
        img.addEventListener('load', () => img.classList.add('loaded'));
        img.addEventListener('click', () => openLightbox(index));

        const dlBtn = document.createElement('button');
        dlBtn.className = 'dl-btn';
        dlBtn.title = 'Descargar';
        dlBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>';
        dlBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          downloadPhoto(photo);
        });

        item.appendChild(img);
        item.appendChild(dlBtn);
        grid.appendChild(item);
      });

      // Lazy load
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            const img = entry.target;
            if (img.dataset.src) {
              img.src = img.dataset.src;
              img.removeAttribute('data-src');
              observer.unobserve(img);
            }
          }
        });
      }, { rootMargin: '300px' });

      grid.querySelectorAll('img[data-src]').forEach(img => observer.observe(img));
    }

    // Lightbox
    function openLightbox(index) {
      currentIndex = index;
      const lb = document.getElementById('lightbox');
      const img = document.getElementById('lightbox-img');
      const photo = currentPhotos[index];
      img.src = `${R2_URL}/${photo.prefix}/${photo.id}.jpg`;
      document.getElementById('lightbox-counter').textContent = `${index + 1} / ${currentPhotos.length}`;
      document.getElementById('lb-dl-btn').onclick = () => downloadPhoto(photo);
      lb.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    function navigateLightbox(dir) {
      currentIndex = (currentIndex + dir + currentPhotos.length) % currentPhotos.length;
      const photo = currentPhotos[currentIndex];
      document.getElementById('lightbox-img').src = `${R2_URL}/${photo.prefix}/${photo.id}.jpg`;
      document.getElementById('lightbox-counter').textContent = `${currentIndex + 1} / ${currentPhotos.length}`;
      document.getElementById('lb-dl-btn').onclick = () => downloadPhoto(photo);
    }

    // Download
    async function downloadPhoto(photo) {
      const url = `${R2_URL}/${photo.prefix}/${photo.id}.jpg`;
      const res = await fetch(url);
      const blob = await res.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `${photo.id}.jpg`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    // Keyboard + swipe
    document.addEventListener('keydown', (e) => {
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') navigateLightbox(-1);
      if (e.key === 'ArrowRight') navigateLightbox(1);
    });

    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => { touchStartX = e.changedTouches[0].screenX; });
    document.addEventListener('touchend', (e) => {
      if (!document.getElementById('lightbox').classList.contains('active')) return;
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) > 50) navigateLightbox(diff > 0 ? -1 : 1);
    });
  </script>

</body>
</html>
