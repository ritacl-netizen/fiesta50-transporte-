<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiesta 50 - Transporte</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      height: 100vh;
      overflow: hidden;
      color: #fff;
    }

    /* Fire video background */
    #bg-video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* Dark overlay */
    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.55);
      z-index: -1;
    }

    /* Centered content */
    .container {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
    }

    .card {
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    h1 {
      font-size: 2.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.7);
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 1.1rem;
      margin-bottom: 40px;
      opacity: 0.9;
      text-shadow: 0 1px 10px rgba(0,0,0,0.6);
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 20px;
      font-size: 1.1rem;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.4);
      color: #fff;
      outline: none;
      transition: border-color 0.3s;
      text-align: center;
      letter-spacing: 2px;
    }

    input[type="text"]::placeholder {
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
    }

    input[type="text"]:focus {
      border-color: #ff6b35;
    }

    button {
      width: 100%;
      padding: 16px 32px;
      font-size: 1.15rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #ff6b35, #e63600);
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(230, 54, 0, 0.5);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* Messages */
    .message {
      margin-top: 24px;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 1rem;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .message.error {
      background: rgba(220, 38, 38, 0.8);
      border: 1px solid rgba(255, 100, 100, 0.4);
      display: block;
    }

    .message.success {
      background: rgba(22, 163, 74, 0.8);
      border: 1px solid rgba(100, 255, 100, 0.4);
      display: block;
    }

    .message.info {
      background: rgba(37, 99, 235, 0.8);
      border: 1px solid rgba(100, 150, 255, 0.4);
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mobile */
    @media (max-width: 520px) {
      h1 { font-size: 2rem; }
      .subtitle { font-size: 0.95rem; margin-bottom: 30px; }
      input[type="text"], button { padding: 14px 16px; font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- REPLACE "fire.mp4" WITH YOUR VIDEO FILE NAME -->
  <video id="bg-video" autoplay muted loop playsinline>
    <source src="fire.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="container">
    <div class="card">
      <h1>FIESTA 50</h1>
      <p class="subtitle">
        Transporte Sofitel &harr; Fiesta<br>
        Ingresá tu DNI o CI para sumarte
      </p>

      <div class="form-group">
        <input
          type="text"
          id="dniInput"
          placeholder="Tu DNI o CI"
          autocomplete="off"
          inputmode="numeric"
        >
      </div>

      <button id="submitBtn" onclick="submitForm()">
        Sumarme al transporte
      </button>

      <div id="message" class="message"></div>
    </div>
  </div>

  <script>
    // ============================================================
    // IMPORTANT: Replace this URL with your deployed Apps Script URL
    // ============================================================
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzwPLGEkw5Rxe6HVlIp2Ks2-0fWXicOeyBMeuzxc9Q8WjOo8rK3riCMC1PHTFWYEh7q/exec';

    const dniInput = document.getElementById('dniInput');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');

    // Submit on Enter key
    dniInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitForm();
    });

    async function submitForm() {
      const id = dniInput.value.trim();

      // Clear previous message
      messageDiv.className = 'message';
      messageDiv.style.display = 'none';

      if (!id) {
        showMessage('Ingresá tu DNI o CI para continuar.', 'error');
        dniInput.focus();
        return;
      }

      // Disable button, show loading
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Verificando...';

      try {
        const response = await fetch(APPS_SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify({ id: id }),
          headers: { 'Content-Type': 'text/plain' },
        });

        const result = await response.json();

        if (result.success) {
          if (result.alreadyRegistered) {
            showMessage(result.message, 'info');
          } else {
            showMessage(result.message, 'success');
          }
          dniInput.value = '';
        } else {
          showMessage(result.message, 'error');
        }
      } catch (err) {
        showMessage('Error de conexión. Intentá de nuevo.', 'error');
      }

      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Sumarme al transporte';
    }

    function showMessage(text, type) {
      messageDiv.textContent = text;
      messageDiv.className = 'message ' + type;
      messageDiv.style.display = 'block';
    }
  </script>

</body>
</html>
